<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Open in Obsidian</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 24px;
      line-height: 1.5;
      background: #f7f8fb;
      color: #111827;
    }
    .card {
      max-width: 560px;
      margin: 0 auto;
      background: rgba(255,255,255,.92);
      border-radius: 18px;
      padding: 22px 20px;
      box-shadow: 0 10px 30px rgba(15,23,42,.08);
    }
    h1 { margin: 0 0 10px; font-size: 1.35rem; }
    p { margin: 0 0 12px; }
    .muted { color: #6b7280; font-size: .95rem; }
    .actions { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
    .btn {
      display: block;
      width: 100%;
      box-sizing: border-box;
      padding: 14px 16px;
      border-radius: 12px;
      text-decoration: none;
      text-align: center;
      font-weight: 700;
      border: 0;
      cursor: pointer;
      font-size: 1rem;
    }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-secondary { background: #e5e7eb; color: #111827; }
    .btn-ghost { background: transparent; color: #4b5563; border: 1px solid #d1d5db; }
    #debug {
      margin-top: 16px;
      font-size: .85rem;
      color: #6b7280;
      word-break: break-all;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #e5e7eb; }
      .card { background: rgba(15,23,42,.92); box-shadow: none; }
      .muted, #debug { color: #94a3b8; }
      .btn-secondary { background: #1f2937; color: #e5e7eb; }
      .btn-ghost { color: #cbd5e1; border-color: #334155; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Obsidian으로 여는 중…</h1>
    <p id="lead">잠시만 기다려 주세요. 자동으로 Obsidian을 열어봅니다.</p>
    <p id="status" class="muted">앱이 열리지 않으면 아래 버튼을 눌러 다시 시도해 주세요.</p>
    <div class="actions">
      <a id="open" class="btn btn-primary" href="#">Obsidian 다시 열기</a>
      <button id="back" class="btn btn-secondary" type="button">Discord로 돌아가기</button>
      <button id="close" class="btn btn-ghost" type="button">이 창 닫기 시도</button>
    </div>
  </div>
  <script>
    function b64urlDecodeUtf8(s) {
      if (!s) return '';
      s = s.replace(/-/g, '+').replace(/_/g, '/');
      while (s.length % 4) s += '=';
      try {
        var bin = atob(s);
        var bytes = new Uint8Array(bin.length);
        for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        return new TextDecoder('utf-8').decode(bytes);
      } catch (e) {
        return '';
      }
    }

    function normalizeFilePath(f) {
      if (!f) return f;
      try {
        var once = decodeURIComponent(f);
        if (once && once !== f) f = once;
      } catch (e) {}
      if (f.endsWith('.md')) f = f.slice(0, -3);
      return f;
    }

    function buildUri(v, f) {
      return 'obsidian://open?vault=' + encodeURIComponent(v) + '&file=' + encodeURIComponent(f);
    }

    function isDiscordIos() {
      var ua = navigator.userAgent || '';
      return /Discord/i.test(ua) && /iPhone|iPad|iPod/i.test(ua);
    }

    function tryClose(statusEl) {
      try { window.open('', '_self'); } catch (e) {}
      try { window.close(); } catch (e) {}
      setTimeout(function () {
        if (statusEl) statusEl.textContent = '자동으로 닫히지 않으면 아래 “Discord로 돌아가기”를 눌러 주세요.';
      }, 300);
    }

    function tryBack(statusEl) {
      try {
        if (history.length > 1) {
          history.back();
          setTimeout(function () {
            if (statusEl) statusEl.textContent = '자동 복귀가 안 되면 “Discord로 돌아가기” 버튼을 한 번 더 눌러 주세요.';
          }, 700);
          return;
        }
      } catch (e) {}
      if (statusEl) statusEl.textContent = '이 화면에서 뒤로가기로 Discord로 돌아가 주세요.';
    }

    (function () {
      var u = new URL(location.href);
      var q = u.searchParams.get('q');
      var v = u.searchParams.get('v');
      var f = u.searchParams.get('f');
      var statusEl = document.getElementById('status');
      var leadEl = document.getElementById('lead');
      var openEl = document.getElementById('open');
      var backEl = document.getElementById('back');
      var closeEl = document.getElementById('close');
      var discordIos = isDiscordIos();
      var launchCount = 0;
      var handoffTimer = null;

      if (q) {
        var dec = b64urlDecodeUtf8(q);
        try {
          var o = JSON.parse(dec);
          v = o.v || v;
          f = o.f || f;
        } catch (e) {
          var p = new URLSearchParams(dec);
          v = v || p.get('v');
          f = f || p.get('f');
        }
      }

      f = normalizeFilePath(f);
      if (!v || !f) {
        leadEl.textContent = '링크 정보가 부족합니다.';
        statusEl.textContent = 'vault/file 정보가 없어 Obsidian을 열 수 없습니다.';
        backEl.textContent = '뒤로가기';
        closeEl.style.display = 'none';
        return;
      }

      var uri = buildUri(v, f);
      openEl.href = uri;
      backEl.addEventListener('click', function () { tryBack(statusEl); });
      closeEl.addEventListener('click', function () { tryClose(statusEl); });
      openEl.addEventListener('click', function () {
        if (discordIos) {
          setTimeout(function () { tryBack(statusEl); }, 2200);
        } else {
          setTimeout(function () { tryClose(statusEl); }, 3000);
        }
      });

      if (discordIos) {
        leadEl.textContent = 'Discord iPhone에서는 자동 닫기 대신 이전 화면으로 돌아가기를 우선 시도합니다.';
        statusEl.textContent = 'Obsidian이 열리면 잠시 뒤 Discord로 돌아가기를 시도합니다. 안 되면 버튼을 눌러 주세요.';
        closeEl.style.display = 'none';
      } else {
        statusEl.textContent = 'Obsidian이 열리면 이 창은 3초 뒤 자동 닫기를 시도합니다.';
      }

      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'hidden') {
          clearTimeout(handoffTimer);
          handoffTimer = setTimeout(function () {
            if (discordIos) tryBack(statusEl);
            else tryClose(statusEl);
          }, discordIos ? 1200 : 3000);
        }
      });

      window.addEventListener('pagehide', function () {
        clearTimeout(handoffTimer);
        handoffTimer = setTimeout(function () {
          if (discordIos) tryBack(statusEl);
          else tryClose(statusEl);
        }, discordIos ? 1200 : 3000);
      });

      setTimeout(function () {
        launchCount += 1;
        location.replace(uri);
        if (discordIos) {
          handoffTimer = setTimeout(function () { tryBack(statusEl); }, 2200);
        } else {
          handoffTimer = setTimeout(function () { tryClose(statusEl); }, 3000);
        }
      }, 80);

    })();
  </script>
</body>
</html>
