<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Open in Obsidian</title><style>body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;margin:2rem;line-height:1.5}a#open{display:inline-block;margin-top:1rem;padding:.6rem 1rem;background:#3b82f6;color:#fff;text-decoration:none;border-radius:.4rem}</style></head><body><p>Redirecting…</p><a id="open" href="#">Open in Obsidian</a><script>function b64urlDecode(s){if(!s)return"";s=s.replace(/-/g,"+").replace(/_/g,"/");while(s.length%4)s+="=";try{return atob(s)}catch(e){return""}}(function(){var u=new URL(location.href);var q=u.searchParams.get("q");var v=u.searchParams.get("v");var f=u.searchParams.get("f");if(q){var dec=b64urlDecode(q);try{var o=JSON.parse(dec);v=o.v||v;f=o.f||f}catch(e){var p=new URLSearchParams(dec);v=v||p.get("v");f=f||p.get("f")}}if(!v||!f){document.body.insertAdjacentHTML("beforeend","<p>Missing v/f</p>");return}var file=encodeURIComponent(f),vault=encodeURIComponent(v);var uri="obsidian://open?vault="+vault+"&file="+file;document.getElementById("open").href=uri;setTimeout(function(){location.replace(uri)},50)})();</script></body></html>
